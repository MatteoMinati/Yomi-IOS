<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0e11" />
    <title>Yomi — Manga Reader</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <!-- iOS: apri a schermo intero da "Aggiungi a Home" -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yomi" />

    <link rel="stylesheet" href="styles.css?v=2" />
  </head>
  <body>
    <main id="app"></main>

    <nav id="tabbar">
      <a href="#/home" data-tab="home">
        <span class="ico">🏠</span><span>Home</span>
      </a>
      <a href="#/search" data-tab="search">
        <span class="ico">🔍</span><span>Cerca</span>
      </a>
      <a href="#/library" data-tab="library">
        <span class="ico">📚</span><span>Libreria</span>
      </a>
    </nav>

    <script type="module" src="app.js?v=2"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
