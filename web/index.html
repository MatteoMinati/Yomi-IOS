<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0e11" />
    <title>Yomi — Manga Reader</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <!-- iOS: apri a schermo intero da "Aggiungi a Home" -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yomi" />

    <link rel="stylesheet" href="styles.css?v=2" />
  </head>
  <body>
    <main id="app"></main>

    <nav id="tabbar">
      <a href="#/home" data-tab="home">
        <span class="ico">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
        </span><span>Home</span>
      </a>
      <a href="#/search" data-tab="search">
        <span class="ico">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span><span>Cerca</span>
      </a>
      <a href="#/library" data-tab="library">
        <span class="ico">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 4h6a3 3 0 0 1 3 3v13a2.5 2.5 0 0 0-2.5-2.5H2z"/><path d="M22 4h-6a3 3 0 0 0-3 3v13a2.5 2.5 0 0 1 2.5-2.5H22z"/></svg>
        </span><span>Libreria</span>
      </a>
    </nav>

    <script type="module" src="app.js?v=2"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
